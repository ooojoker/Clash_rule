;Custom_OpenClash_Rules_No_Jsdelivr
;去除了所有失效的远程链接，全本地化 GeoSite/GeoIP 优化版
;精简版：已剔除 Netflix/Disney/HBO/PrimeVideo/Emby/Bahamut 专属规则与策略组

[custom]
;设置规则标志位（由上往下优先命中）

;--- 1. 个人自定义私有规则（最高优先级，保留你的 Joker 自定义库） ---
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ooojoker/Clash_rule/refs/heads/main/rules/nas_direct.list,28800
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ooojoker/Clash_rule/refs/heads/main/rules/zdy_direct.list,28800
ruleset=☁️ 自定代理,https://raw.githubusercontent.com/ooojoker/Clash_rule/refs/heads/main/rules/zdy_proxy.list,28800

;--- 2. 基础本地网络直连（替代原 Lan.list 和 Custom_Direct） ---
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve

;--- 3. 游戏、国内大厂修正及 PT/BT 直连 ---
ruleset=🎯 全球直连,[]GEOSITE,google-cn
ruleset=🎯 全球直连,[]GEOSITE,steam@cn
ruleset=🎯 全球直连,[]GEOSITE,category-games@cn
ruleset=🎯 全球直连,[]GEOSITE,category-game-platforms-download
ruleset=🎯 全球直连,[]GEOSITE,category-public-tracker

;--- 4. 社交/特殊应用/AI 服务 ---
ruleset=💬 即时通讯,[]GEOSITE,category-communication
ruleset=🌐 社交媒体,[]GEOSITE,category-social-media-!cn
ruleset=🤖 AI服务,[]GEOSITE,openai
ruleset=🤖 AI服务,[]GEOSITE,category-ai-!cn
ruleset=🚀 GitHub,[]GEOSITE,github
ruleset=🚀 测速工具,[]GEOSITE,category-speedtest

;--- 5. 常见海外大厂及流媒体（全本地 GeoSite 化，未单独列出的流媒体自动归类于此） ---
ruleset=🎮 Steam,[]GEOSITE,steam
ruleset=📹 YouTube,[]GEOSITE,youtube
ruleset=🍎 苹果服务,[]GEOSITE,apple
ruleset=Ⓜ️ 微软服务,[]GEOSITE,microsoft
ruleset=📢 谷歌FCM,[]GEOSITE,googlefcm
ruleset=🇬 谷歌服务,[]GEOSITE,google
ruleset=🎶 TikTok,[]GEOSITE,tiktok
ruleset=🎻 Spotify,[]GEOSITE,spotify
ruleset=🎮 游戏平台,[]GEOSITE,category-games
ruleset=🌎 国外媒体,[]GEOSITE,category-entertainment
ruleset=🛒 国外电商,[]GEOSITE,category-ecommerce

;--- 6. 强匹配与防泄漏代理规则（替代原 Custom_Proxy 与 GFW 拦截） ---
ruleset=🚀 手动选择,[]GEOSITE,gfw
ruleset=💬 即时通讯,[]GEOIP,telegram,no-resolve
ruleset=🌐 社交媒体,[]GEOIP,twitter,no-resolve
ruleset=🌐 社交媒体,[]GEOIP,facebook,no-resolve
ruleset=🇬 谷歌服务,[]GEOIP,google,no-resolve

;--- 7. 国内大兜底（防境外 DNS 污染，确保国内极速直连） ---
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ooojoker/Clash_rule/refs/heads/main/rules/zdy_finaldirect.list
ruleset=🎯 全球直连,[]GEOSITE,cn
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve

;--- 8. 最终全兜底代理 ---
ruleset=🐟 漏网之鱼,[]FINAL

;===============================================================
;策略组定义（引入全量物理节点单选组，让核心控制组更清爽）

;--- 1. 总代理控制核心（加入了美国故障转移组选项） ---
custom_proxy_group=🚀 手动选择`select`[]♻️ 自动选择`[]🇺🇸 美国自动`[]🇺🇸 美国故障转移`[]🗺️ 其它`[]🎛️ 节点手动单选

;--- 2. 自动化及国家筛选过滤组 ---
custom_proxy_group=♻️ 自动选择`url-test`.*`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇺🇸 美国自动`url-test`(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States|UnitedStates|🇺🇸)`https://cp.cloudflare.com/generate_204`300,,50
;👉 新增的美国故障转移组：按顺序首选健康的美国节点，节点挂了自动往下滚
custom_proxy_group=🇺🇸 美国故障转移`fallback`(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States|UnitedStates|🇺🇸)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🗺️ 其它`url-test`^(?!.*(美|US|United|🇺🇸)).*`https://cp.cloudflare.com/generate_204`300,,50

;--- 3. 🛠️ 全物理节点平铺单选组（把乱哄哄的节点全赶到这里来，需要定点排障时才点开它） ---
custom_proxy_group=🎛️ 节点手动单选`select`.*

